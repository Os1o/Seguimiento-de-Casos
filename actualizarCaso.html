<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Seguimiento - Sistema de Gestion de Juicios</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header-gob app-header" data-home-href="casos.html" data-module="Civil / Mercantil" data-back-href="casos.html" data-back-label="Volver a asuntos"></header>

    <div class="container">
        <div class="breadcrumb">
            <a href="casos.html">Asuntos</a>
            <span class="breadcrumb-separator">></span>
            <a href="#" id="linkDetalle">Detalle del Asunto</a>
            <span class="breadcrumb-separator">></span>
            <span>Actualizar Seguimiento</span>
        </div>

        <div class="page-header">
            <div>
                <h1 class="page-title">Actualizar Seguimiento</h1>
                <p class="page-subtitle">Expediente: <span id="numExpediente">-</span></p>
            </div>
        </div>

        <form id="formActualizar" class="card">
            <!-- Expediente (solo lectura) -->
            <div class="form-section">
                <div class="form-group">
                    <label class="form-label">Expediente</label>
                    <input type="text" id="folioExpediente" class="form-input" disabled style="background: var(--color-bg); font-weight: 600;">
                </div>
            </div>

            <!-- Fecha de actuaciÃ³n, Tipo de actuaciÃ³n y PrÃ³ximo vencimiento -->
            <div class="form-section">
                <div class="form-grid" style="grid-template-columns: 1fr 1fr 1fr;">
                    <div class="form-group">
                        <label class="form-label required">Fecha de actuaciÃ³n</label>
                        <input type="date" id="fechaActuacion" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label required">Tipo de actuaciÃ³n</label>
                        <select id="tipoActuacion" class="form-select" required>
                            <option value="">Seleccione...</option>
                            <option value="Acuerdo">Acuerdo</option>
                            <option value="Alegatos">Alegatos</option>
                            <option value="Amparo">Amparo</option>
                            <option value="Archivo">Archivo</option>
                            <option value="Audiencia">Audiencia</option>
                            <option value="Caducidad">Caducidad</option>
                            <option value="ConciliaciÃ³n">ConciliaciÃ³n</option>
                            <option value="ContestaciÃ³n">ContestaciÃ³n</option>
                            <option value="Demanda">Demanda</option>
                            <option value="Desahogo">Desahogo</option>
                            <option value="EjecuciÃ³n">EjecuciÃ³n</option>
                            <option value="NotificaciÃ³n">NotificaciÃ³n</option>
                            <option value="Pericial">Pericial</option>
                            <option value="PromociÃ³n">PromociÃ³n</option>
                            <option value="Pruebas">Pruebas</option>
                            <option value="Recurso">Recurso</option>
                            <option value="Sentencia">Sentencia</option>
                            <option value="Sobreseimiento">Sobreseimiento</option>
                            <option value="SuspensiÃ³n">SuspensiÃ³n</option>
                            <option value="Vista">Vista</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Fecha de PrÃ³ximo vencimiento <small style="color: var(--color-text-light);">(opcional)</small></label>
                        <input type="date" id="fechaVencimiento" class="form-input">
                    </div>
                </div>
            </div>

            <!-- DescripciÃ³n -->
            <div class="form-section">
                <div class="form-group">
                    <label class="form-label required">DescripciÃ³n de lo sucedido en esta actuaciÃ³n</label>
                    <textarea id="descripcionActuacion" class="form-textarea" placeholder="Describe lo sucedido..." rows="5" required></textarea>
                </div>
            </div>

            <!-- Datos adjuntos -->
            <div class="form-section">
                <h3 class="form-section-title">Datos adjuntos</h3>

                <div class="form-group">
                    <label class="form-label">Adjuntar PDF</label>
                    <input type="file" id="inputPDF" class="form-input" accept=".pdf" style="padding: 8px;">
                    <small style="color: var(--color-text-light);">Solo archivos PDF. TamaÃ±o mÃ¡ximo recomendado: 500 KB</small>
                    <div id="errorPDF" style="display:none; color: var(--color-danger); font-size: 13px; margin-top: 4px;"></div>
                </div>

                <!-- Lista de documentos ya adjuntos -->
                <div id="listaDocumentos" style="margin-top: 12px;"></div>
            </div>

            <!-- Botones -->
            <div style="display: flex; gap: 16px; justify-content: flex-end; margin-top: 32px;">
                <a href="#" id="btnCancelar" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-success">Guardar</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/supabaseService.js"></script>
    <script src="js/headerComponent.js"></script>
    <script src="js/actualizarCaso.js"></script>
</body>
</html>
