<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Seguimiento - Sistema de Gestión de Juicios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/stylesNew.css">
</head>
<body>
    <header class="header-gob app-header" data-home-href="casos.html" data-module="Civil / Mercantil" data-back-href="casos.html" data-back-label="Volver a asuntos" data-header-variant="modern" data-show-module-nav="false"></header>

    <div class="container">
        <div class="breadcrumb">
            <a href="casos.html">Asuntos</a>
            <span class="breadcrumb-separator">></span>
            <a href="#" id="linkDetalle">Detalle del Asunto</a>
            <span class="breadcrumb-separator">></span>
            <span>Actualizar Seguimiento</span>
        </div>

        <div class="page-header">
            <div>
                <h1 class="page-title">Actualizar Seguimiento</h1>
                <p class="page-subtitle">Expediente: <span id="numExpediente">-</span></p>
            </div>
        </div>

        <form id="formActualizar" class="card">
            <!-- Expediente (solo lectura) -->
            <div class="form-section">
                <div class="form-group">
                    <label class="form-label">Expediente</label>
                    <input type="text" id="folioExpediente" class="form-input" disabled style="background: var(--color-bg); font-weight: 600;">
                </div>
            </div>

            <!-- Fecha de actuación, Tipo de actuación, Próximo vencimiento y Estatus -->
            <div class="form-section">
                <div class="form-grid" style="grid-template-columns: 1fr 1fr 1fr 1fr;">
                    <div class="form-group">
                        <label class="form-label required">Fecha de actuación</label>
                        <input type="date" id="fechaActuacion" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label required">Tipo de actuación</label>
                        <select id="tipoActuacion" class="form-select" required>
                            <option value="">Seleccione...</option>
                            <option value="Acuerdo">Acuerdo</option>
                            <option value="Alegatos">Alegatos</option>
                            <option value="Amparo">Amparo</option>
                            <option value="Archivo">Archivo</option>
                            <option value="Audiencia">Audiencia</option>
                            <option value="Caducidad">Caducidad</option>
                            <option value="Conciliación">Conciliación</option>
                            <option value="Contestación">Contestación</option>
                            <option value="Demanda">Demanda</option>
                            <option value="Desahogo">Desahogo</option>
                            <option value="Ejecución">Ejecución</option>
                            <option value="Notificación">Notificación</option>
                            <option value="Pericial">Pericial</option>
                            <option value="Promoción">Promoción</option>
                            <option value="Pruebas">Pruebas</option>
                            <option value="Recurso">Recurso</option>
                            <option value="Sentencia">Sentencia</option>
                            <option value="Sobreseimiento">Sobreseimiento</option>
                            <option value="Suspensión">Suspensión</option>
                            <option value="Vista">Vista</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Fecha de Próximo vencimiento <small style="color: var(--color-text-light);">(opcional)</small></label>
                        <input type="date" id="fechaVencimiento" class="form-input">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Estatus del Asunto</label>
                        <select id="estatusAsunto" class="form-select">
                            <option value="">Sin cambio</option>
                            <option value="TRAMITE">En trámite</option>
                            <option value="CONCLUIDO">Concluido</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Descripción -->
            <div class="form-section">
                <div class="form-group">
                    <label class="form-label required">Descripción de lo sucedido en esta actuación</label>
                    <textarea id="descripcionActuacion" class="form-textarea" placeholder="Describe lo sucedido..." rows="5" required></textarea>
                </div>
            </div>

            <!-- Documento de la actualización -->
            <div class="form-section">
                <h3 class="form-section-title">Documento de la actualización</h3>

                <div class="form-group">
                    <label class="form-label">Adjuntar PDF</label>
                    <input type="file" id="inputPDF" class="form-input" accept=".pdf" style="padding: 8px;">
                    <small style="color: var(--color-text-light);">Solo archivos PDF. Se ligará a esta actualización. Tamaño máximo recomendado: 10 MB</small>
                    <div id="errorPDF" style="display:none; color: var(--color-danger); font-size: 13px; margin-top: 4px;"></div>
                    <div style="margin-top: 8px;">
                        <button type="button" id="btnQuitarPDF" class="btn btn-secondary" style="display:none;">Quitar archivo seleccionado</button>
                    </div>
                </div>

                <!-- Ayuda visual -->
                <div id="listaDocumentos" style="margin-top: 12px;"></div>
            </div>

            <!-- Botones -->
            <div style="display: flex; gap: 16px; justify-content: flex-end; margin-top: 32px;">
                <a href="#" id="btnCancelar" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-success">Guardar</button>
            </div>
        </form>

        <div class="card" style="margin-top: 24px;">
            <h3 class="section-title">Historial de actualizaciones</h3>
            <div id="timelineCivil" class="timeline"></div>
        </div>
    </div>

    <script src="js/headerComponent.js"></script>
    <script src="js/textLimiter.js"></script>
    <script src="js/actualizarCaso.js"></script>
</body>
</html>
