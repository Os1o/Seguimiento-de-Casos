<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de conocimiento del AMP - Sistema de Gestion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/stylesNew.css">
</head>
<body class="modern-header-page">
    <header class="header-gob app-header" data-home-href="penal.html" data-module="Penal" data-back-href="detalleCasoPenal.html" data-back-label="Volver al detalle" data-header-variant="modern" data-show-module-nav="false"></header>

    <div class="container">
        <div class="breadcrumb">
            <a href="penal.html">Asuntos Penales</a>
            <span class="breadcrumb-separator">></span>
            <a href="#" id="linkDetalle">Detalle del asunto</a>
            <span class="breadcrumb-separator">></span>
            <span id="breadcrumbExpediente">Registro de conocimiento del AMP</span>
        </div>

        <section class="penal-amp-shell">
            <div class="penal-amp-hero">
                <div class="penal-amp-hero-copy">
                    <h1 class="penal-amp-title">Registro de conocimiento del AMP</h1>
                </div>

                <aside class="penal-intake-aside penal-amp-aside" aria-hidden="true"></aside>
            </div>

            <div class="card penal-amp-summary">
                <div class="penal-amp-summary-head">
                    <h2>Referencia del asunto</h2>
                </div>

                <div class="penal-amp-summary-grid">
                    <div class="info-item">
                        <span class="info-label">No. de carpeta</span>
                        <span class="info-value" id="resumenExpediente">---</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Delito que se investiga</span>
                        <span class="info-value" id="resumenDelito">---</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Estatus actual</span>
                        <span class="info-value" id="resumenEstatus">---</span>
                    </div>
                </div>
            </div>

            <form id="formActualizar" class="card penal-amp-form">
                <div class="penal-amp-form-head">
                    <h3>Fecha de conocimiento del AMP</h3>
                </div>

                <div class="penal-amp-grid">
                    <div class="form-group">
                        <label class="form-label required" for="fechaActuacion">Fecha de conocimiento del AMP / Fiscal</label>
                        <input type="date" id="fechaActuacion" class="form-input" required>
                    </div>
                </div>

                <div class="penal-legacy-hidden" aria-hidden="true">
                    <div class="form-group">
                        <label class="form-label" for="tipoActuacion">Tipo de actuacion</label>
                        <select id="tipoActuacion" class="form-select">
                            <option value="">Seleccione...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="estatusAsunto">Estatus del asunto</label>
                        <select id="estatusAsunto" class="form-select">
                            <option value="">Sin cambio</option>
                            <option value="TRAMITE">En tramite</option>
                            <option value="CONCLUIDO">Concluido</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="descripcion">Descripcion</label>
                        <textarea id="descripcion" class="form-textarea"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="inputPDFPenal">Adjuntar PDF</label>
                        <input type="file" id="inputPDFPenal" class="form-input" accept=".pdf">
                    </div>

                    <button type="button" id="btnQuitarPDFPenal">Quitar archivo</button>
                    <div id="errorPDFPenal"></div>
                    <div id="listaDocumentosPenal"></div>
                    <div id="timeline" class="timeline"></div>
                    <p id="subtituloExpediente"></p>
                    <span id="resumenEstadoProcesal"></span>
                </div>

                <div class="penal-amp-actions">
                    <a href="detalleCasoPenal.html" id="btnCancelarAmp" class="btn btn-secondary">Cancelar</a>
                    <a href="registroActuacionPenal.html" id="btnIrActuacion" class="btn btn-secondary">Ir a actuación penal</a>
                    <button type="submit" class="btn btn-success">Guardar registro</button>
                </div>
            </form>
        </section>
    </div>

    <script src="js/headerComponent.js"></script>
    <script src="js/textLimiter.js"></script>
    <script src="js/registroAmpPenal.js"></script>
</body>
</html>
