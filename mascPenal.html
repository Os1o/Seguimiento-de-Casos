<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASC penal - Sistema de Gestión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/stylesNew.css">
</head>

<body class="modern-header-page penal-intake-page">
    <header class="header-gob app-header" data-home-href="penal.html" data-module="Penal"
        data-back-href="detalleCasoPenal.html" data-back-label="Volver al detalle" data-header-variant="modern"
        data-show-module-nav="false"></header>

    <div class="container">
        <div class="breadcrumb">
            <a href="penal.html">Asuntos Penales</a>
            <span class="breadcrumb-separator">></span>
            <a href="detalleCasoPenal.html" id="breadcrumbDetalleMasc">Detalle del asunto</a>
            <span class="breadcrumb-separator">></span>
            <span>MASC</span>
        </div>

        <section class="penal-act-shell">
            <div class="penal-act-hero">
                <div class="penal-act-hero-copy">
                    <h1 class="penal-act-title" id="tituloMascPenal">Registrar MASC</h1>
                </div>
            </div>

            <div class="card penal-act-summary">
                <div class="penal-act-summary-head">
                    <h2>Referencia del asunto</h2>
                </div>

                <div class="penal-act-summary-grid">
                    <div class="info-item">
                        <span class="info-label">No. de carpeta</span>
                        <span class="info-value" id="mascNumeroCarpeta">---</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Estatus actual</span>
                        <span class="info-value" id="mascEstatus">---</span>
                    </div>
                    <div class="info-item" id="mascModoEdicionInfo" style="display: none;">
                        <span class="info-label">Modo</span>
                        <span class="info-value">Edición de MASC</span>
                    </div>
                </div>
            </div>

            <form id="formMascPenal" class="card penal-act-form">
                <div class="penal-act-form-head">
                    <h3>Datos del convenio</h3>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label required" for="fechaConvenioMasc">Fecha del convenio MASC</label>
                        <input type="date" id="fechaConvenioMasc" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="cierraCarpetaMasc">¿Este MASC cierra la carpeta?</label>
                        <select id="cierraCarpetaMasc" class="form-select">
                            <option value="0">No</option>
                            <option value="1">Sí</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label required" for="descripcionMasc">Descripción del convenio</label>
                    <textarea id="descripcionMasc" class="form-textarea" rows="8" maxlength="1000" required></textarea>
                    <small class="form-hint"><span id="contadorDescripcionMasc">0</span>/1000 caracteres.</small>
                </div>

                <div class="alert alert-warning" id="avisoCierreMasc" style="display: none;">
                    Al guardar, la carpeta pasará a estatus Concluido y se generará una actuación de cierre automática.
                </div>

                <div class="penal-act-actions">
                    <a href="detalleCasoPenal.html" class="btn btn-secondary" id="btnCancelarMasc">Cancelar</a>
                    <button type="submit" class="btn btn-success" id="btnGuardarMasc">Guardar MASC</button>
                </div>
            </form>
        </section>
    </div>

    <script src="js/headerComponent.js"></script>
    <script src="js/mascPenal.js"></script>
</body>

</html>
